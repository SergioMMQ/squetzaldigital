<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CMS | S Quetzal Digital</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" data-netlify-identity-url="https://squetzaldigitaal.netlify.app"></script>
  <style>
    /* ── Base ─────────────────────────────────────── */
    * { box-sizing: border-box; }
    body { margin: 0; }

    /* ── Mobile overrides (≤768px) ────────────────── */
    @media (max-width: 768px) {

      /* Barra superior */
      [class*="AppHeader"] {
        padding: 8px 12px !important;
        min-height: 52px !important;
      }

      /* Logo / nombre del sitio */
      [class*="AppHeaderTitle"] {
        font-size: 14px !important;
      }

      /* Botones de la barra superior */
      [class*="AppHeader"] button,
      [class*="AppHeader"] a {
        padding: 8px 10px !important;
        font-size: 13px !important;
        min-height: 40px !important;
        min-width: 40px !important;
      }

      /* Sidebar de colecciones */
      [class*="Nav"] {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Entradas de colección (lista de artículos) */
      [class*="CollectionEntry"],
      [class*="EntryCard"] {
        padding: 14px 16px !important;
        font-size: 15px !important;
        min-height: 56px !important;
      }

      /* Editor: campos de formulario */
      [class*="ControlContainer"],
      [class*="Widget"] {
        padding: 8px 0 !important;
      }

      input[type="text"],
      input[type="email"],
      input[type="url"],
      select,
      textarea {
        font-size: 16px !important; /* evita zoom en iOS */
        padding: 10px 12px !important;
        border-radius: 6px !important;
        width: 100% !important;
      }

      /* Etiquetas de campo */
      label,
      [class*="FieldLabel"] {
        font-size: 13px !important;
        font-weight: 600 !important;
        margin-bottom: 4px !important;
      }

      /* Editor Markdown — barra de herramientas */
      [class*="Toolbar"],
      [class*="toolbar"] {
        flex-wrap: wrap !important;
        gap: 4px !important;
        padding: 6px !important;
      }

      [class*="Toolbar"] button,
      [class*="toolbar"] button {
        min-width: 36px !important;
        min-height: 36px !important;
        font-size: 15px !important;
      }

      /* Área de texto del editor markdown */
      [class*="EditorControl"] textarea,
      [class*="Editor"] .CodeMirror {
        font-size: 15px !important;
        line-height: 1.6 !important;
        min-height: 300px !important;
      }

      /* Botones Guardar / Publicar */
      [class*="PublishButton"],
      [class*="SaveButton"],
      [class*="ToolbarButton"] {
        min-height: 44px !important;
        padding: 10px 16px !important;
        font-size: 14px !important;
        border-radius: 6px !important;
      }

      /* Panel de previsualización — ocultarlo en mobile para ganar espacio */
      [class*="PreviewPane"],
      [class*="preview-pane"] {
        display: none !important;
      }

      /* Modal de login */
      [class*="Modal"],
      [data-netlify-identity-button] {
        width: 94vw !important;
        max-width: 400px !important;
        padding: 20px !important;
        border-radius: 12px !important;
      }
    }

    /* ── Desktop: sin cambios relevantes ──────────── */
    @media (min-width: 769px) {
      /* El panel de previsualización se muestra normalmente */
      [class*="PreviewPane"] {
        display: block !important;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
